name: Release

# Pushing a version tag (e.g. v0.1.0) kicks off the release builds.
on:
  push:
    tags:
      - "v*"

# Bundling works: the macOS .app/.dmg builds with libghostty-vt.dylib bundled
# into Contents/Frameworks and resolved via a baked rpath (no runtime
# DYLD_LIBRARY_PATH). See docs/technical/packaging-and-distribution.md.
#
# Release builds must be signed, notarized, and updater-signed. Missing secrets
# fail fast before the long build so a tag never produces an installable-looking
# artifact that Gatekeeper rejects.
# Reverie targets macOS (Apple Silicon) only.

permissions:
  contents: write # needed to create the GitHub Release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release (macOS, Apple Silicon)
    # Pinned to macos-15 (arm64), not macos-latest: macos-latest migrated to
    # macOS 26, whose SDK the pinned Zig 0.15.2 toolchain fails to link
    # libghostty-vt against (a flood of undefined libSystem symbols). macos-15 is
    # the last image this build is known to link cleanly on.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Pull the release notes for this tag from CHANGELOG.md (the single source
      # of truth) and hand them to tauri-action as the GitHub Release body. Runs
      # before the long build so a missing changelog entry fails the release fast.
      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          {
            echo 'notes<<__CHANGELOG_EOF__'
            node scripts/changelog-extract.mjs "${GITHUB_REF_NAME}"
            echo '__CHANGELOG_EOF__'
          } >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      # libghostty-vt requires the Zig 0.15.x toolchain to build.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: npm ci
      - name: Verify release signing secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required release secret(s): ${missing[*]}" >&2
            echo "Reverie releases must be signed, notarized, and updater-signed before distribution." >&2
            exit 1
          fi
      # Build the web assets up front so frontendDist exists before bundling.
      - name: Build web assets
        run: npm run build:web
      - name: Build and publish the desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Auto-updater signing: the Tauri minisign key (separate from Apple
          # signing) that signs the .app.tar.gz the updater downloads.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          args: --target aarch64-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: Reverie ${{ github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false

      # Guard against ever shipping a broken bundle again. v0.5.0 shipped a
      # 0-byte libghostty-vt.dylib (a build-script staging race) and aborted at
      # launch with a dyld "Library not loaded" error. Fail the release here,
      # before notarizing/publishing, if the bundled dylib is missing, empty, or
      # not a Mach-O binary.
      - name: Verify bundled Ghostty dylib
        run: |
          set -euo pipefail
          APP=$(find apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)
          if [ -z "$APP" ]; then
            echo "No .app bundle found to verify." >&2
            exit 1
          fi
          DYLIB="$APP/Contents/Frameworks/libghostty-vt.dylib"
          if [ ! -s "$DYLIB" ]; then
            echo "Bundled Ghostty dylib is missing or empty: $DYLIB" >&2
            exit 1
          fi
          if ! file "$DYLIB" | grep -q 'Mach-O'; then
            echo "Bundled Ghostty dylib is not a Mach-O binary:" >&2
            file "$DYLIB" >&2
            exit 1
          fi
          echo "OK: $DYLIB ($(stat -f%z "$DYLIB") bytes)"
          file "$DYLIB"

      # tauri-action notarizes and staples the .app but leaves the .dmg wrapper
      # signed-but-unnotarized, which makes recent macOS show a one-time "cannot
      # verify" prompt when the user first opens the downloaded DMG. Notarize and
      # staple the DMG too, then replace the asset on the draft release.
      - name: Notarize and staple the DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DMG=$(find apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)
          if [ -z "$DMG" ]; then
            echo "No DMG found to notarize." >&2
            exit 1
          fi
          echo "Notarizing DMG: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          echo "Re-uploading stapled DMG to release ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" "$DMG" --clobber
